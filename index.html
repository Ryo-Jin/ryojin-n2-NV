const key=(b,p,i)=>`rjin-v1:${b}:${p}:${i}`; const isKnown=(b,p,i)=>localStorage.getItem(key(b,p,i))==='1'; const setKnown=(b,p,i,v)=>v?localStorage.setItem(key(b,p,i),'1'):localStorage.removeItem(key(b,p,i));
